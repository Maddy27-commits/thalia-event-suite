name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main          # auto-deploy on every push to main
  pull_request:
    branches:
      - main          # run Build & Deploy as a status check on PRs into main
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Only deploy on push to main (or manual dispatch). PRs run the build
      # as a status check but do NOT push to production.
      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thalia-event-suite
