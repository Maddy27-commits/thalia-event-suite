<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thalia — Event Planning Platform</title>
    <meta name="description" content="Thalia — Where event planners and clients collaborate beautifully." />

    <!--
      Open Graph + Twitter Card metadata.
      These are what social platforms (LinkedIn, Slack, iMessage, X) read to
      build a link-preview card. Without og:title / og:url / og:image, LinkedIn
      reports the URL as "not a valid link" even when it returns HTTP 200.
      The og:image MUST be a raster (PNG/JPG) at an absolute URL — LinkedIn
      does not support SVG here — hence /og-image.png (1200x630).
      URLs are absolute and canonicalised to the site root so every deep link
      (e.g. /welcome) still unfurls to the same brand card.
    -->
    <link rel="canonical" href="https://thalia-event-suite.pages.dev/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Thalia" />
    <meta property="og:url" content="https://thalia-event-suite.pages.dev/" />
    <meta property="og:title" content="Thalia — Event Planning Platform" />
    <meta property="og:description" content="Where event planners and their clients collaborate beautifully. AI concepts, vendor coordination, and timelines in one place." />
    <meta property="og:image" content="https://thalia-event-suite.pages.dev/og-image.png" />
    <meta property="og:image:secure_url" content="https://thalia-event-suite.pages.dev/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Thalia — Muse of celebration" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thalia — Event Planning Platform" />
    <meta name="twitter:description" content="Where event planners and their clients collaborate beautifully." />
    <meta name="twitter:image" content="https://thalia-event-suite.pages.dev/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
