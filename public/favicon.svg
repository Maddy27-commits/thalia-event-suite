<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#C4921A"/>

  <!-- Outer soft petals (8) -->
  <g fill="#FAF8F4" opacity="0.25" transform="translate(16,16)">
    <ellipse cx="0" cy="-8" rx="2.2" ry="5"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(45)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(90)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(135)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(225)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(270)"/>
    <ellipse cx="0" cy="-8" rx="2.2" ry="5" transform="rotate(315)"/>
  </g>

  <!-- Mid petals (6) -->
  <g fill="#FAF8F4" opacity="0.5" transform="translate(16,16)">
    <ellipse cx="0" cy="-5.5" rx="1.8" ry="4"/>
    <ellipse cx="0" cy="-5.5" rx="1.8" ry="4" transform="rotate(60)"/>
    <ellipse cx="0" cy="-5.5" rx="1.8" ry="4" transform="rotate(120)"/>
    <ellipse cx="0" cy="-5.5" rx="1.8" ry="4" transform="rotate(180)"/>
    <ellipse cx="0" cy="-5.5" rx="1.8" ry="4" transform="rotate(240)"/>
    <ellipse cx="0" cy="-5.5" rx="1.8" ry="4" transform="rotate(300)"/>
  </g>

  <!-- Inner petals (5) -->
  <g fill="#FAF8F4" opacity="0.75" transform="translate(16,16)">
    <ellipse cx="0" cy="-3.5" rx="1.3" ry="3"/>
    <ellipse cx="0" cy="-3.5" rx="1.3" ry="3" transform="rotate(72)"/>
    <ellipse cx="0" cy="-3.5" rx="1.3" ry="3" transform="rotate(144)"/>
    <ellipse cx="0" cy="-3.5" rx="1.3" ry="3" transform="rotate(216)"/>
    <ellipse cx="0" cy="-3.5" rx="1.3" ry="3" transform="rotate(288)"/>
  </g>

  <!-- Centre glow -->
  <circle cx="16" cy="16" r="3.5" fill="#FAF8F4" opacity="0.3"/>
  <!-- Centre dot -->
  <circle cx="16" cy="16" r="2" fill="#2C2420"/>
  <!-- Highlight -->
  <circle cx="15.2" cy="15.2" r="0.7" fill="#FAF8F4" opacity="0.7"/>
</svg>
